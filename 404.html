<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>404 - Page Not Found</title>
  <style>
    body {
      margin: 0;
      background: #202124;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      height: 100vh;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }

    h1 {
      font-size: 80px;
      margin: 0;
    }

    p {
      font-size: 18px;
      opacity: 0.7;
      margin-top: 10px;
    }

    a {
      margin-top: 20px;
      color: #8ab4f8;
      text-decoration: none;
      font-size: 16px;
    }

    a:hover {
      text-decoration: underline;
    }

    .box {
      text-align: center;
      padding: 30px;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      background: rgba(255,255,255,0.03);
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>404</h1>
    <p>Oops… this page doesn’t exist.</p>
    <a href="/Google-NoJs/">Go back home</a>
  </div>
</body>
</html>
