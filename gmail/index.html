
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); }
.app { display: flex; height: 100vh; min-height: 600px; background: var(--color-background-tertiary); }
.sidebar { width: 256px; min-width: 256px; padding: 8px; display: flex; flex-direction: column; gap: 2px; }
.compose-btn { display: flex; align-items: center; gap: 12px; padding: 16px 24px; margin: 8px 8px 16px; background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: 24px; cursor: pointer; font-size: 14px; font-weight: 500; color: var(--color-text-primary); }
.compose-icon { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; }
.nav-item { display: flex; align-items: center; gap: 16px; padding: 4px 16px; border-radius: 24px; cursor: pointer; font-size: 14px; color: var(--color-text-secondary); height: 36px; transition: background 0.1s; }
.nav-item:hover { background: var(--color-background-secondary); }
.nav-item.active { background: #E8F0FE; color: #1a73e8; font-weight: 500; }
.nav-icon { width: 20px; height: 20px; opacity: 0.7; }
.nav-item.active .nav-icon { opacity: 1; }
.badge { margin-left: auto; font-size: 12px; font-weight: 500; }
.nav-item.active .badge { color: #1a73e8; }
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.toolbar { display: flex; align-items: center; gap: 8px; padding: 8px 16px; border-bottom: 0.5px solid var(--color-border-tertiary); background: var(--color-background-tertiary); }
.toolbar-btn { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--color-text-secondary); }
.toolbar-btn:hover { background: var(--color-background-secondary); }
.divider-v { width: 1px; height: 20px; background: var(--color-border-tertiary); margin: 0 4px; }
.email-list { flex: 1; overflow-y: auto; background: var(--color-background-primary); border-radius: 16px; margin: 8px; }
.email-row { display: flex; align-items: center; gap: 8px; padding: 0 16px; height: 52px; border-bottom: 0.5px solid var(--color-border-tertiary); cursor: pointer; transition: background 0.1s; }
.email-row:hover { background: #F2F6FC; box-shadow: 0 1px 2px rgba(0,0,0,0.1); z-index: 1; }
.email-row.unread .sender { font-weight: 600; color: var(--color-text-primary); }
.email-row.unread .subject { font-weight: 600; color: var(--color-text-primary); }
.check-area { width: 40px; display: flex; align-items: center; justify-content: center; }
.avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 500; flex-shrink: 0; }
.star { width: 28px; display: flex; align-items: center; justify-content: center; color: var(--color-text-tertiary); flex-shrink: 0; }
.email-content { flex: 1; display: flex; align-items: center; gap: 8px; min-width: 0; overflow: hidden; }
.sender { font-size: 14px; width: 160px; min-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--color-text-secondary); }
.subject-line { flex: 1; display: flex; align-items: center; gap: 6px; overflow: hidden; }
.subject { font-size: 14px; color: var(--color-text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.preview { font-size: 14px; color: var(--color-text-tertiary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sep { color: var(--color-text-tertiary); }
.time { font-size: 12px; color: var(--color-text-tertiary); white-space: nowrap; margin-left: auto; flex-shrink: 0; }
.tag { font-size: 11px; padding: 2px 8px; border-radius: 4px; white-space: nowrap; flex-shrink: 0; font-weight: 500; }
.tag.social { background: #E8F5E9; color: #1E8E3E; }
.tag.promo { background: #E8F0FE; color: #1a73e8; }
.tag.update { background: #FFF8E1; color: #F29900; }
.header { display: flex; align-items: center; gap: 8px; padding: 8px 16px 4px; }
.search-bar { flex: 1; display: flex; align-items: center; background: #EAF1FB; border-radius: 24px; padding: 8px 16px; gap: 12px; height: 48px; }
.search-bar input { border: none; background: transparent; outline: none; font-size: 16px; color: var(--color-text-primary); flex: 1; font-family: var(--font-sans); }
.search-bar input::placeholder { color: var(--color-text-tertiary); }
.user-avatar { width: 36px; height: 36px; border-radius: 50%; background: #1a73e8; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 500; color: white; cursor: pointer; flex-shrink: 0; }
.gmail-logo { display: flex; align-items: center; gap: 4px; width: 160px; min-width: 160px; padding-left: 8px; }
.gmail-logo-text { font-size: 22px; color: var(--color-text-secondary); font-weight: 400; letter-spacing: -0.5px; }
.gmail-logo span { color: #EA4335; }
.gmail-logo span:nth-child(2) { color: #4285F4; }
.gmail-logo span:nth-child(3) { color: #FBBC05; }
.gmail-logo span:nth-child(4) { color: #34A853; }
.gmail-logo span:nth-child(5) { color: #4285F4; }
.gmail-logo span:nth-child(6) { color: #EA4335; }
.tabs { display: flex; border-bottom: 0.5px solid var(--color-border-tertiary); padding: 0 8px; }
.tab { display: flex; align-items: center; gap: 8px; padding: 12px 16px; cursor: pointer; font-size: 14px; color: var(--color-text-secondary); border-bottom: 3px solid transparent; }
.tab.active { color: #1a73e8; border-bottom-color: #1a73e8; }
@media (max-width: 700px) { .sidebar { display: none; } }
</style>

      <div class="check-area">
        <div style="width:18px; height:18px; border-radius:50%; border:1.5px solid #bdbdbd; cursor:pointer;"></div>
      </div>
      <div class="avatar" style="background:${e.color}; color:white; font-size:${e.avatar.length > 2 ? '10px' : '13px'};">${e.avatar}</div>
      <div class="star" onclick="event.stopPropagation(); toggleStar(${i}, this)">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="${e.starred ? '#F4B400' : 'none'}" stroke="${e.starred ? '#F4B400' : '#bdbdbd'}" stroke-width="1.5"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
      </div>
      <div class="email-content">
        <div class="sender">${e.from}</div>
        <div class="subject-line">
          ${e.tag ? `<span class="tag ${e.tag}">${e.tag}</span>` : ''}
          <span class="subject">${e.subject}</span>
          <span class="sep">—</span>
          <span class="preview">${e.preview}</span>
        </div>
      </div>
      <div class="time">${e.time}</div>
    </div>
  `).join('');
}

function toggleStar(i, el) {
  emails[i].starred = !emails[i].starred;
  const svg = el.querySelector('svg');
  svg.setAttribute('fill', emails[i].starred ? '#F4B400' : 'none');
  svg.setAttribute('stroke', emails[i].starred ? '#F4B400' : '#bdbdbd');
}

function openEmail(i) {
  const e = emails[i];
  emails[i].unread = false;
  const main = document.querySelector('.main');
  main.innerHTML = `
    <div style="display:flex; align-items:center; gap:8px; padding:12px 16px; border-bottom:0.5px solid var(--color-border-tertiary);">
      <div class="toolbar-btn" onclick="goBack()"><svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg></div>
      <div class="toolbar-btn"><svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg></div>
      <div class="toolbar-btn"><svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg></div>
    </div>
    <div style="flex:1; overflow-y:auto; padding:24px 32px;">
      <h2 style="font-size:22px; font-weight:400; margin-bottom:20px; color:var(--color-text-primary);">${e.subject}</h2>
      <div style="display:flex; align-items:center; gap:12px; margin-bottom:24px;">
        <div class="avatar" style="background:${e.color}; color:white; width:40px; height:40px; font-size:${e.avatar.length>2?'10px':'14px'};">${e.avatar}</div>
        <div style="flex:1;">
          <div style="font-size:14px; font-weight:500; color:var(--color-text-primary);">${e.from}</div>
          <div style="font-size:12px; color:var(--color-text-secondary);">to me <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor" style="vertical-align:middle"><path d="M7 10l5 5 5-5z"/></svg></div>
        </div>
        <div style="font-size:12px; color:var(--color-text-secondary);">${e.time}</div>
        <div class="toolbar-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M10 9V5l-7 7 7 7v-4.1c5 0 8.5 1.6 11 5.1-1-5-4-10-11-11z"/></svg></div>
        <div class="toolbar-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M7 8V5l-7 7 7 7v-3l-4-4 4-4zm6 1V5l-7 7 7 7v-4.1c5 0 8.5 1.6 11 5.1-1-5-4-10-11-11z"/></svg></div>
      </div>
      <div style="font-size:14px; line-height:1.8; color:var(--color-text-primary); max-width:600px;">
        <p style="margin-bottom:16px;">Hello,</p>
        <p style="margin-bottom:16px;">${e.preview}</p>
        <p style="margin-bottom:16px;">If you did not expect this, please review your account security settings and revoke any unauthorized access immediately.</p>
        <p style="margin-bottom:24px;">Best regards,<br>${e.from} Team</p>
      </div>
      <div style="display:flex; gap:12px; margin-top:16px;">
        <button style="border:0.5px solid var(--color-border-secondary); background:transparent; padding:8px 20px; border-radius:20px; font-size:14px; cursor:pointer; color:var(--color-text-primary); display:flex; align-items:center; gap:8px;" onclick="showCompose()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M10 9V5l-7 7 7 7v-4.1c5 0 8.5 1.6 11 5.1-1-5-4-10-11-11z"/></svg>
          Reply
        </button>
        <button style="border:0.5px solid var(--color-border-secondary); background:transparent; padding:8px 20px; border-radius:20px; font-size:14px; cursor:pointer; color:var(--color-text-primary); display:flex; align-items:center; gap:8px;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M7 8V5l-7 7 7 7v-3l-4-4 4-4zm6 1V5l-7 7 7 7v-4.1c5 0 8.5 1.6 11 5.1-1-5-4-10-11-11z"/></svg>
          Forward
        </button>
      </div>
    </div>
  `;
  main.style.display = 'flex';
  main.style.flexDirection = 'column';
}

function goBack() {
  const main = document.querySelector('.main');
  main.innerHTML = '';
  main.appendChild(buildInbox());
  renderEmails();
}

function buildInbox() {
  return document.getElementById('inbox-view');
}

function goBack() {
  location.reload();
}

function showCompose() {
  const m = document.getElementById('compose-modal');
  if (m) { m.style.display = m.style.display === 'none' ? 'block' : 'none'; }
}

function setActive(el) {
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  el.classList.add('active');
}

renderEmails();
</script>
