<body>

<div class="app">

<!-- ===== COMPOSE MODAL ===== -->
<div class="compose-modal" id="compose-modal">
  <div class="compose-header" onclick="toggleCompose()">
    <span>New Message</span>
    <div class="compose-header-btns">
      <button class="compose-header-btn" title="Minimize" onclick="event.stopPropagation()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M19 13H5v-2h14v2z"/></svg>
      </button>
      <button class="compose-header-btn" title="Full screen" onclick="event.stopPropagation()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
      </button>
      <button class="compose-header-btn" title="Close" onclick="closeCompose(); event.stopPropagation()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
      </button>
    </div>
  </div>
  <div class="compose-field">
    <label>To</label>
    <input type="text" id="compose-to" placeholder="" />
  </div>
  <div class="compose-field">
    <label>Subject</label>
    <input type="text" id="compose-subject" placeholder="" />
  </div>
  <div class="compose-body">
    <textarea id="compose-body"></textarea>
  </div>
  <div class="compose-footer">
    <button class="send-btn">Send</button>
    <div class="compose-tools">
      <button class="toolbar-btn" title="Formatting">
        <svg viewBox="0 0 24 24" fill="#5f6368"><path d="M2.5 4v3h5v12h3V7h5V4h-13zm19 5h-9v3h3v7h3v-7h3V9z"/></svg>
      </button>
      <button class="toolbar-btn" title="Attach files">
        <svg viewBox="0 0 24 24" fill="#5f6368"><path d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5a2.5 2.5 0 015 0v10.5c0 .55-.45 1-1 1s-1-.45-1-1V6H10v9.5a2.5 2.5 0 005 0V5c0-2.21-1.79-4-4-4S7 2.79 7 5v12.5c0 3.04 2.46 5.5 5.5 5.5s5.5-2.46 5.5-5.5V6h-1.5z"/></svg>
      </button>
      <button class="toolbar-btn" title="Insert link">
        <svg viewBox="0 0 24 24" fill="#5f6368"><path d="M3.9 12c0-1.71 1.39-3.1 3.1-3.1h4V7H7c-2.76 0-5 2.24-5 5s2.24 5 5 5h4v-1.9H7c-1.71 0-3.1-1.39-3.1-3.1zM8 13h8v-2H8v2zm9-6h-4v1.9h4c1.71 0 3.1 1.39 3.1 3.1s-1.39 3.1-3.1 3.1h-4V17h4c2.76 0 5-2.24 5-5s-2.24-5-5-5z"/></svg>
      </button>
      <button class="toolbar-btn" title="Insert emoji">
        <svg viewBox="0 0 24 24" fill="#5f6368"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm3.5-9c.83 0 1.5-.67 1.5-1.5S16.33 8 15.5 8 14 8.67 14 9.5s.67 1.5 1.5 1.5zm-7 0c.83 0 1.5-.67 1.5-1.5S9.33 8 8.5 8 7 8.67 7 9.5 7.67 11 8.5 11zm3.5 6.5c2.33 0 4.31-1.46 5.11-3.5H6.89c.8 2.04 2.78 3.5 5.11 3.5z"/></svg>
      </button>
      <button class="toolbar-btn" title="Delete draft">
        <svg viewBox="0 0 24 24" fill="#5f6368"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
      </button>
    </div>
  </div>
</div>

<script>
// ===== EMAIL DATA =====
const emails = [
  { id:0, from:"Google",       initials:"G",   color:"#EA4335", subject:"Security alert",                             preview:"A new sign-in on Windows — review your account",          time:"10:42 AM", unread:true,  starred:true,  tag:null },

  { id:2, from:"Notion",       initials:"N",   color:"#000",    subject:"Your weekly digest is here",                preview:"See what your team has been working on this week",         time:"8:55 AM",  unread:true,  starred:false, tag:"update" },

  { id:4, from:"Stripe",       initials:"S",   color:"#635BFF", subject:"Your invoice from Stripe — $49.00",         preview:"Invoice #IN-00192 — Thank you for your business!",         time:"Yesterday",unread:true,  starred:false, tag:null },
  { id:5, from:"Mom",          initials:"M",   color:"#E8710A", subject:"Weekend plans?",                            preview:"Hi honey, are you coming over for dinner on Sunday?",      time:"Yesterday",unread:false, starred:true,  tag:null },
  { id:6, from:"Figma",        initials:"F",   color:"#F24E1E", subject:"Design System v2.0 was shared with you",   preview:"Alex Johnson shared a file — Open in Figma",              time:"Yesterday",unread:false, starred:false, tag:null },

  { id:8, from:"Anthropic",    initials:"A",   color:"#D4A27F", subject:"Your Claude Pro subscription",             preview:"Thanks for subscribing! Here's what's included.",          time:"Mon",      unread:false, starred:false, tag:null },
  { id:9, from:"Airbnb",       initials:"Air", color:"#FF5A5F", subject:"Your upcoming trip to Barcelona",          preview:"Check-in in 3 days! Tips for your stay",                   time:"Sun",      unread:false, starred:true,  tag:"update" },
  { id:10,from:"Vercel",       initials:"▲",   color:"#000",    subject:"[vercel] Deployment failed",               preview:"TypeError: Cannot read property of undefined at build",    time:"Sun",      unread:false, starred:false, tag:null },
  { id:11,from:"Netflix",      initials:"N",   color:"#E50914", subject:"New releases you might like",              preview:"Ripley, Baby Reindeer, 3 Body Problem and more",            time:"Sat",      unread:false, starred:false, tag:"promo" },
  { id:12,from:"Apple",        initials:"",  color:"#555",    subject:"Your receipt from Apple",                   preview:"App Store purchase — $4.99 — PDF attached",                time:"Sat",      unread:false, starred:false, tag:null },
  { id:13,from:"Dropbox",      initials:"DB",  color:"#0061FF", subject:"Someone viewed your shared folder",        preview:"Project Assets was viewed by 2 new people",               time:"Fri",      unread:false, starred:false, tag:null },
];

// ===== RENDER EMAIL LIST =====
function renderList() {
  const list = document.getElementById('email-list');
  list.innerHTML = emails.map(e => `
    <div class="email-row ${e.unread ? 'unread' : 'read'}" data-id="${e.id}" onclick="openEmail(${e.id})">
      <div class="row-check" onclick="event.stopPropagation()">
        <input type="checkbox" />
      </div>

      <div class="row-star ${e.starred ? 'starred' : ''}" onclick="toggleStar(event, ${e.id})">
        <svg viewBox="0 0 24 24" stroke-width="1.5">
          <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
        </svg>
      </div>

      <div class="row-avatar" style="background:${e.color}; font-size:${e.initials.length > 2 ? '10px' : '13px'}">
        ${e.initials}
      </div>

      <div class="row-content">
        <div class="row-sender">${e.from}</div>
        <div class="row-body">
          ${e.tag ? `<span class="row-tag ${e.tag}">${e.tag}</span>` : ''}
          <span class="row-subject">${e.subject}</span>
          <span class="row-sep">—</span>
          <span class="row-preview">${e.preview}</span>
        </div>
      </div>

      <div class="email-time">${e.time}</div>
      <div class="row-actions">
        <button class="toolbar-btn" title="Archive" onclick="event.stopPropagation()">
          <svg viewBox="0 0 24 24" fill="#5f6368"><path d="M20.54 5.23l-1.39-1.68C18.88 3.21 18.47 3 18 3H6c-.47 0-.88.21-1.16.55L3.46 5.23C3.17 5.57 3 6.02 3 6.5V19c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V6.5c0-.48-.17-.93-.46-1.27zM12 17.5L6.5 12H10v-2h4v2h3.5L12 17.5zM5.12 5l.81-1h12l.94 1H5.12z"/></svg>
        </button>
        <button class="toolbar-btn" title="Delete" onclick="event.stopPropagation()">
          <svg viewBox="0 0 24 24" fill="#5f6368"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
        </button>
        <button class="toolbar-btn" title="Mark as read" onclick="event.stopPropagation()">
          <svg viewBox="0 0 24 24" fill="#5f6368"><path d="M21.99 8c0-.72-.37-1.35-.94-1.7L12 1 2.95 6.3C2.38 6.65 2 7.28 2 8v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2l-.01-12zm-2 0l-8 5-8-5 8-4.68L19.99 8z"/></svg>
        </button>
        <button class="toolbar-btn" title="Snooze" onclick="event.stopPropagation()">
          <svg viewBox="0 0 24 24" fill="#5f6368"><path d="M22 9V7h-2V5c0-1.1-.9-2-2-2H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2v-2h2v-2h-2v-2h2v-2h-2V9h2zm-4 10H4V5h14v14z"/></svg>
        </button>
      </div>
    </div>
  `).join('');
}

// ===== OPEN EMAIL =====
function openEmail(id) {
  const e = emails.find(x => x.id === id);
  if (!e) return;
  e.unread = false;

  const panel = document.getElementById('main-panel');
  panel.innerHTML = `
    <div class="toolbar">
      <button class="toolbar-btn" title="Back to inbox" onclick="backToInbox()">
        <svg viewBox="0 0 24 24" fill="#5f6368"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
      </button>
      <button class="toolbar-btn" title="Archive">
        <svg viewBox="0 0 24 24" fill="#5f6368"><path d="M20.54 5.23l-1.39-1.68C18.88 3.21 18.47 3 18 3H6c-.47 0-.88.21-1.16.55L3.46 5.23C3.17 5.57 3 6.02 3 6.5V19c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V6.5c0-.48-.17-.93-.46-1.27zM12 17.5L6.5 12H10v-2h4v2h3.5L12 17.5zM5.12 5l.81-1h12l.94 1H5.12z"/></svg>
      </button>
      <button class="toolbar-btn" title="Delete">
        <svg viewBox="0 0 24 24" fill="#5f6368"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
      </button>
      <button class="toolbar-btn" title="Mark as unread">
        <svg viewBox="0 0 24 24" fill="#5f6368"><path d="M21.99 8c0-.72-.37-1.35-.94-1.7L12 1 2.95 6.3C2.38 6.65 2 7.28 2 8v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2l-.01-12zm-2 0l-8 5-8-5 8-4.68L19.99 8z"/></svg>
      </button>
      <div class="toolbar-divider"></div>
      <button class="toolbar-btn" title="More options">
        <svg viewBox="0 0 24 24" fill="#5f6368"><path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg>
      </button>
      <div class="toolbar-pagination">1 of ${emails.length}</div>
    </div>
    <div class="email-detail">
      <h1 class="detail-subject">${e.subject}</h1>
      <div class="detail-header">
        <div class="detail-avatar" style="background:${e.color}; font-size:${e.initials.length > 2 ? '10px' : '14px'}">${e.initials}</div>
        <div class="detail-sender-info">
          <div class="detail-sender-name">${e.from} <span style="font-weight:400; color:#5f6368">&lt;noreply@${e.from.toLowerCase().replace(/\s/g,'')}.com&gt;</span></div>
          <div class="detail-sender-meta">to me <svg width="12" height="12" viewBox="0 0 24 24" fill="#5f6368" style="vertical-align:middle"><path d="M7 10l5 5 5-5z"/></svg></div>
        </div>
        <div class="detail-time">${e.time}</div>
        <button class="toolbar-btn">
          <svg viewBox="0 0 24 24" fill="#5f6368"><path d="M10 9V5l-7 7 7 7v-4.1c5 0 8.5 1.6 11 5.1-1-5-4-10-11-11z"/></svg>
        </button>
        <button class="toolbar-btn">
          <svg viewBox="0 0 24 24" fill="#5f6368"><path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg>
        </button>
      </div>
      <div class="detail-body">
        <p>Hello,</p>
        <p>${e.preview}</p>
        <p>Please review this information and take any necessary action. If you did not expect this notification, you can review your account security settings to ensure everything is in order.</p>
        <p>If you have any questions, our support team is available 24/7 to assist you.</p>
        <p>Best regards,<br /><strong>${e.from}</strong></p>
      </div>
      <div class="detail-actions">
        <button class="detail-action-btn" onclick="openCompose()">
          <svg viewBox="0 0 24 24" style="width:18px;height:18px;fill:currentColor"><path d="M10 9V5l-7 7 7 7v-4.1c5 0 8.5 1.6 11 5.1-1-5-4-10-11-11z"/></svg>
          Reply
        </button>
        <button class="detail-action-btn" onclick="openCompose()">
          <svg viewBox="0 0 24 24" style="width:18px;height:18px;fill:currentColor"><path d="M7 8V5l-7 7 7 7v-3l-4-4 4-4zm6 1V5l-7 7 7 7v-4.1c5 0 8.5 1.6 11 5.1-1-5-4-10-11-11z"/></svg>
          Forward
        </button>
      </div>
    </div>
  `;

        Primary
      </div>
      <div class="tab" onclick="setTab(this)">
        <svg viewBox="0 0 24 24" style="width:18px;height:18px;fill:currentColor"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>

      <div class="tab" onclick="setTab(this)">
        <svg viewBox="0 0 24 24" style="width:18px;height:18px;fill:currentColor"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg>
        Promotions <span class="tab-badge promo">12</span>
      </div>
    </div>
    <div class="toolbar">
      <button class="toolbar-btn"><svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-9 14l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg></button>
      <button class="toolbar-btn"><svg viewBox="0 0 24 24"><path d="M7 10l5 5 5-5z"/></svg></button>
      <div class="toolbar-divider"></div>
      <button class="toolbar-btn"><svg viewBox="0 0 24 24"><path d="M17.65 6.35A7.958 7.958 0 0012 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0112 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg></button>
      <div class="toolbar-pagination">1–50 of 1,284
        <button class="toolbar-btn"><svg viewBox="0 0 24 24"><path d="M15.41 16.59L10.83 12l4.58-4.59L14 6l-6 6 6 6z"/></svg></button>
        <button class="toolbar-btn"><svg viewBox="0 0 24 24"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6z"/></svg></button>
      </div>
    </div>
    <div class="email-list" id="email-list"></div>
  `;
  renderList();
}

// ===== STAR TOGGLE =====
function toggleStar(event, id) {
  event.stopPropagation();
  const e = emails.find(x => x.id === id);
  if (!e) return;
  e.starred = !e.starred;
  const row = document.querySelector(`.email-row[data-id="${id}"] .row-star`);
  if (row) {
    row.classList.toggle('starred', e.starred);
  }
}

// ===== COMPOSE =====
function openCompose() {
  document.getElementById('compose-modal').classList.add('open');
}
function closeCompose() {
  document.getElementById('compose-modal').classList.remove('open');
}
function toggleCompose() {
  document.getElementById('compose-modal').classList.toggle('open');
}

// ===== TAB & NAV =====
function setTab(el) {
  el.closest('.tabs').querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
}
function setNav(event, el) {
  event.preventDefault();
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  el.classList.add('active');
}
function showInbox(event, el) {
  event.preventDefault();
  setNav(event, el);
  backToInbox();
}

// ===== INIT =====
renderList();
</script>
</body>
</html>
