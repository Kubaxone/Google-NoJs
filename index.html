<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Google</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" href="assets/favicon.ico" type="image/x-icon" />
</head>
<body>

  <!-- Header -->
  <header>
    <a href="#">Gmail</a>
    <a href="#">Images</a>
    <!-- Grid icon -->
    <button style="background:none;border:none;cursor:pointer;padding:6px;" title="Google apps">
      <svg focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20">
        <path fill="#5f6368" d="M6 8a2 2 0 1 0 0-4 2 2 0 0 0 0 4zm0 6a2 2 0 1 0 0-4 2 2 0 0 0 0 4zm0 6a2 2 0 1 0 0-4 2 2 0 0 0 0 4zm6-12a2 2 0 1 0 0-4 2 2 0 0 0 0 4zm0 6a2 2 0 1 0 0-4 2 2 0 0 0 0 4zm0 6a2 2 0 1 0 0-4 2 2 0 0 0 0 4zm6-12a2 2 0 1 0 0-4 2 2 0 0 0 0 4zm0 6a2 2 0 1 0 0-4 2 2 0 0 0 0 4zm0 6a2 2 0 1 0 0-4 2 2 0 0 0 0 4z"/>
      </svg>
    </button>
    <div class="header-avatar">S</div>
  </header>

  <!-- Main -->
  <main>
    <div class="logo" aria-label="Google">
      <span>G</span><span>o</span><span>o</span><span>g</span><span>l</span><span>e</span>
    </div>

    <!-- Search form — submits to Google -->
    <form action="https://www.google.com/search" method="get" target="_blank" class="search-wrap" id="searchForm">
      <div class="autocomplete" id="autocomplete">
        <div class="search-box">
          <!-- Search icon -->
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="22" y2="22"/>
          </svg>

          <input
            type="text"
            name="q"
            id="q"
            autocomplete="off"
            spellcheck="false"
            aria-label="Search"
            autofocus
          />

          <!-- Clear button (shown when input has text) -->
          <button type="button" id="clearBtn" class="mic-btn" style="display:none;" title="Clear">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>

          <!-- Mic icon -->
          <button type="button" class="mic-btn" title="Search by voice" onclick="alert('Voice search not available in this demo')">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 1a4 4 0 0 1 4 4v7a4 4 0 0 1-8 0V5a4 4 0 0 1 4-4z"/>
              <path d="M19 11a7 7 0 0 1-14 0"/>
              <line x1="12" y1="18" x2="12" y2="22"/>
              <line x1="8" y1="22" x2="16" y2="22"/>
            </svg>
          </button>
        </div>

        <!-- Autocomplete suggestions -->
        <ul class="autocomplete-list" id="suggestionList" role="listbox"></ul>
      </div>
    </form>

    <!-- Buttons -->
    <div class="search-buttons">
      <button class="btn" type="submit" form="searchForm">Google Search</button>
      <button class="btn" type="button" onclick="feelingLucky()">I'm Feeling Lucky</button>
    </div>

    <p class="lang-line">
      Google offered in:
      <a href="https://www.google.pl" target="_blank">Polski</a>
    </p>
  </main>

  <!-- Footer -->
  <footer>
    <div class="footer-top">
      <a href="#">Poland</a>
    </div>
    <div class="footer-bottom">
      <div>
        <a href="#">Advertising</a>
        <a href="#">Business</a>
        <a href="#">How Search works</a>
      </div>
      <div>
        <a href="#">Privacy</a>
        <a href="#">Terms</a>
        <a href="#">Settings</a>
      </div>
    </div>
  </footer>

  <script src="assets/search.js"></script>
</body>
</html>
